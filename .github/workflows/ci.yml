name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtmultimedia
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgl1-mesa-dev libxcb-*-dev

      - name: Configure (CMake)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: List tests
        run: ctest --test-dir build -N

      - name: Run tests
        shell: bash
        run: |
          mkdir -p test-results
          set -o pipefail
          ctest --test-dir build \
            --output-on-failure \
            --no-tests=error \
            --output-junit test-results/ctest.xml \
            | tee test-results/ctest-output.txt

      - name: Add test summary
        if: always()
        shell: bash
        run: |
          {
            echo "## CTest result"
            echo '```text'
            if [ -f test-results/ctest-output.txt ]; then
              printf '%s\n' "$(<test-results/ctest-output.txt)"
            else
              echo "CTest did not produce output. Check the earlier build steps."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-results
          path: |
            test-results/
            build/Testing/Temporary/*.log
          if-no-files-found: warn

  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cmake g++ qt6-base-dev

      - name: Run clang-tidy
        run: |
          find src/ -name "*.cpp" -o -name "*.h" | xargs clang-tidy -p . 2>/dev/null || true
